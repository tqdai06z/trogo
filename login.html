<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập - Roomie</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/auth.css">
  <link rel="stylesheet" href="./css/responsive.css">
  <style>
    .error-msg {
      color: red;
      font-size: 13px;
      display: block;
      margin-top: 5px;
      font-weight: bold;
    }
    
    /* CSS để định dạng chữ Roomie thay cho cái hộp icon cũ */
    .auth-brand-text {
      font-size: 28px;
      font-weight: 800;
      color: #007bff; /* Màu xanh thương hiệu chủ đạo */
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      display: block;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="auth-main">
    <div class="auth-glow auth-glow-left"></div>
    <div class="auth-glow auth-glow-right"></div>

    <section class="glass-panel auth-card fade-in">
      <div class="auth-heading">
        <span class="auth-brand-text">Roomie</span>
        
        <h1 class="auth-title display-font">Chào Mừng Trở Lại</h1>
        <p class="auth-subtitle">Tìm phòng trọ nhanh chóng, kết nối không gian sống lý tưởng</p>
      </div>

      <form id="auth-login-form" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="login-email-input">Email tài khoản</label>
          <div class="field-with-icon">
            <span class="icon">✉</span>
            <input type="email" id="login-email-input" class="form-input auth-input" placeholder="vidu@tqdai06.com">
          </div>
          <span class="error-msg" id="email-error"></span>
        </div>

        <div class="form-group">
          <div class="label-row">
            <label class="form-label" for="login-password-input">Mật khẩu</label>
            <a href="#" class="small-link">Quên mật khẩu?</a>
          </div>
          <div class="field-with-icon">
            <input type="password" id="login-password-input" class="form-input auth-input" placeholder="••••••••" style="padding-left: 12px; padding-right: 12px;">
          </div>
          <span class="error-msg" id="password-error"></span>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="login-cookie-demo">
          <label for="login-cookie-demo">Duy trì đăng nhập trên máy này</label>
        </div>

        <button type="submit" class="btn-primary-action">
          <span>Đăng nhập cá nhân</span>
        </button>
      </form>

      <div class="auth-divider">
        <span>Hoặc tiếp tục với</span>
      </div>

      <button type="button" id="btn-google-sso" class="oauth-btn">
        <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.22-.67-.35-1.37-.35-2.09z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
        </svg>
        Đăng nhập bằng Google
      </button>

      <p class="auth-note">
        Chưa có tài khoản trên Roomie?
        <a href="#" id="auth-signup-demo" class="small-link">Đăng ký ngay</a>
      </p>
    </section>
  </main>

  <script src="./js/components.js" data-page="login"></script>
  <script src="./js/rooms-data.js"></script>
  <script src="./js/main.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
